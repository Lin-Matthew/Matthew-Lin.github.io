<!DOCTYPE html>
<html lang="{{ .Site.Language.Locale }}">
{{ partial "head.html" . }}
{{ partial "nav.html" . }}
<!-- Page Header -->
{{ block "header" .}}
{{ $headerImg := .Site.Params.header_image }}
<header class="intro-header" style="
	{{ if $headerImg }}
        background-image: url('{{ $headerImg | relURL }}');
    {{ else }}
        background-color: #395B71;
    {{ end }}
	
	height: 200px !important; 
	display: flex !important; 
	align-items: center !important; 
	justify-content: center !important; 
	min-height: auto !important; 
	padding: 0 !important;">
    <div class="container" style="width: 100% !important;">
        <div class="row">
            <div class="col-lg-8 col-lg-offset-2 col-md-10 col-md-offset-1 ">
                <div class="site-heading" style="padding: 0 !important; margin: 0 !important; text-align: center !important;">
                    <!-- <h1>{{ .Site.Title}} </h1> -->
                    <!--<hr class="small">-->
		    <span class="subheading">{{ .Site.Params.slogan }}</span>
                </div>
            </div>
        </div>
    </div>
</header>
{{ end }}

{{ block "main" . }}
{{ end }}

{{ partial "footer.html" . }}
{{ if .Store.Get "hasMermaid" }}
  <!-- Use the UMD build instead of ESM so Cloudflare won't rewrite it -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"
          data-cfasync="false" defer></script>
  <script data-cfasync="false" defer>
    document.addEventListener('DOMContentLoaded', function () {
      mermaid.initialize({ startOnLoad: true, securityLevel: 'loose' });
    });
  </script>
{{ end }}
</body>
</html>
