    $toggle.addEventListener('click', handleMagic)
    function handleMagic(e){

        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        var navLinks = document.querySelectorAll('.navbar-collapse a');
        navLinks.forEach(function(link) {

                    setTimeout(function(){
                        if($navbar.className.indexOf('in') < 0) {

                        }
                    },400)
                }
            });
        });
    });
</script>

<script>
    function loadAsync(u, c) {
      var d = document, t = 'script',
          o = d.createElement(t),
          s = d.getElementsByTagName(t)[0];
      o.src = u;
      if (c) { o.addEventListener('load', function (e) { c(null, e); }, false); }
      s.parentNode.insertBefore(o, s);
    }
</script>

<script>
    (function() {
        function updateTagcloudColors() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const startColor = isDark ? '#808080' : '#bbbbee';
            if($('#tag_cloud').length !== 0 && $.fn.tagcloud) {
                $.fn.tagcloud.defaults = {
                    color: {start: startColor, end: '#0085a1'},
                };
                $('#tag_cloud a').tagcloud();
            }
        }

        
        $(document).ready(function() {
            updateTagcloudColors();
        });

        
        const observer = new MutationObserver(function(mutations) {
            mutations.forEach(function(mutation) {
                if (mutation.attributeName === 'data-theme') {
                    updateTagcloudColors();
                }
            });
        });

        observer.observe(document.documentElement, {
            attributes: true,
            attributeFilter: ['data-theme']
        });
    })();
</script>

<div class="modal fade" id="searchModal" tabindex="-1" role="dialog" aria-labelledby="searchModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content">
            <div class="modal-header" style="border: none; padding: 15px 20px 5px 20px;">
                <button type="button" class="close" data-dismiss="modal" aria-label="Close" style="font-size: 30px; opacity: 0.6;">
                    <span aria-hidden="true">&times;</span>
                </button>
                <h4 class="modal-title" id="searchModalLabel" style="text-align: center; font-weight: bold; color: #333;">搜索文章</h4>
            </div>
            <div class="modal-body" style="padding: 20px;">
                <div class="form-group" style="margin-bottom: 20px;">
                    <input type="text" class="form-control" id="local-search-input" placeholder="输入关键词，秒速搜索文章..." style="height: 45px; font-size: 16px; border-radius: 4px;">
                </div>
                <div id="local-search-result" style="max-height: 350px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    var searchInput = document.getElementById('local-search-input');
    var resultArea = document.getElementById('local-search-result');

    if (!searchInput || !resultArea) return;

    
    var isEnglish = window.location.pathname.startsWith('/en/');
    var labels = {
        noResults: isEnglish ? 'No matches found ╮(╯▽╰)╭' : '没有找到符合条件的文章 ╮(╯▽╰)╭',
        failLoad: isEnglish ? 'Search index failed to load. Ensure search.json is accessible.' : '搜索内核加载失败，请确保本地 search.json 可访问'
    };

    
    searchInput.addEventListener('input', function () {
        var keywords = this.value.trim().toLowerCase();
        resultArea.innerHTML = ""; 

        if (keywords.length <= 0) return;

        
        fetch('http:\/\/localhost:1313\/algolisearch.json')
            .then(function (response) {
                return response.json();
            })
            .then(function (data) {
                var hits = [];
                
                
                data.forEach(function (post) {
                    var titleMatch = post.title && post.title.toLowerCase().indexOf(keywords) !== -1;
                    var contentMatch = post.content && post.content.toLowerCase().indexOf(keywords) !== -1;
                    var subtitleMatch = post.subtitle && post.subtitle.toLowerCase().indexOf(keywords) !== -1;
                    
                    if (titleMatch || contentMatch || subtitleMatch) {
                        hits.push(post);
                    }
                });

                
                if (hits.length === 0) {
                    
                    resultArea.innerHTML = '<p style="text-align:center; color:#999; padding: 20px;">' + labels.noResults + '</p>';
                } else {
                    var html = '<ul style="list-style: none; padding: 0; margin: 0;">';
                    hits.forEach(function (hit) {
                        html += '<li style="padding: 12px; border-bottom: 1px solid #eee; transition: background 0.2s;">';
                        html += '  <a href="' + hit.uri + '" style="font-size: 16px; font-weight: bold; color: #007bff; text-decoration: none; display: block; margin-bottom: 5px;">' + hit.title + '</a>';
                        if(hit.tags && hit.tags.length > 0) {
                            html += '  <span style="font-size: 11px; background: #f1f1f1; color: #666; padding: 2px 6px; border-radius: 3px; margin-right: 8px;">' + hit.tags.join(', ') + '</span>';
                        }
                        html += '  <span style="font-size: 12px; color: #999;">' + hit.date + '</span>';
                        html += '</li>';
                    });
                    html += '</ul>';
                    resultArea.innerHTML = html;
                }
            })
            .catch(function (err) {
                console.error("搜索索引加载失败:", err);
                
                resultArea.innerHTML = '<p style="text-align:center; color:red; padding: 20px;">' + labels.failLoad + '</p>';
            });
    });
	
	
    
    
    var searchTrigger = document.querySelector('nav a[href*="/search"]') || document.querySelector('.search-icon');
    
    if (searchTrigger) {
        searchTrigger.addEventListener('click', function (e) {
            e.preventDefault(); 
            $('#searchModal').modal('show'); 
        });
    }
});
</script>
